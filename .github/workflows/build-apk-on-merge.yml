name: Build APK on Merge

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR and Issue Details
        id: fetch_details
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          NUMBER=$(echo "$COMMIT_MSG" | grep -oP '\[\K\d+(?=\])' | head -n 1 || echo "")
          
          if [ -n "$NUMBER" ]; then
            TITLE=$(gh issue view "$NUMBER" --json title --jq '.title' || echo "Unknown Title")
            echo "issue_title=$TITLE" >> $GITHUB_OUTPUT
            echo "issue_number=$NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=${{ github.server_url }}/${{ github.repository }}/pull/$NUMBER" >> $GITHUB_OUTPUT
            echo "issue_url=${{ github.server_url }}/${{ github.repository }}/issues/$NUMBER" >> $GITHUB_OUTPUT
          else
            echo "issue_title=Manual Build" >> $GITHUB_OUTPUT
            echo "issue_number=0" >> $GITHUB_OUTPUT
            echo "pr_url=" >> $GITHUB_OUTPUT
            echo "issue_url=" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        id: decode_keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release-key.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=../release-key.jks" > keystore.properties
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keystore.properties

      - name: Build APKs (Debug & Release)
        run: ./gradlew assembleDebug assembleRelease -PissueNumber=${{ steps.fetch_details.outputs.issue_number }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/elevator-simulator-debug-1.0-${{ steps.fetch_details.outputs.issue_number }}.apk
            app/build/outputs/apk/release/elevator-simulator-release-1.0-${{ steps.fetch_details.outputs.issue_number }}.apk
          body: |
            Automated build from merge to main.
            
            **Changes in this build:**
            ${{ steps.fetch_details.outputs.issue_title }}
            ${{ steps.fetch_details.outputs.issue_url }}
            ${{ steps.fetch_details.outputs.pr_url }}
            
            **Downloads:**
            - **Debug APK:** For testing and development.
            - **Release APK:** Signed and ready for distribution.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/elevator-simulator-debug-1.0-${{ steps.fetch_details.outputs.issue_number }}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/elevator-simulator-release-1.0-${{ steps.fetch_details.outputs.issue_number }}.apk

      - name: Post to Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'C0B9S2W064A'
          slack-message: |
            *New Build Available* ✅
            The PR has been merged and the APKs are ready.
            
            *Changes in this build:*
            ${{ steps.fetch_details.outputs.issue_title }}
            ${{ steps.fetch_details.outputs.issue_url }}
            ${{ steps.fetch_details.outputs.pr_url }}

            *Release APK:* ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ github.run_number }}/elevator-simulator-release-1.0-${{ steps.fetch_details.outputs.issue_number }}.apk
            *Debug APK:* ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ github.run_number }}/elevator-simulator-debug-1.0-${{ steps.fetch_details.outputs.issue_number }}.apk
            *Run Summary:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.APK_DISTRIBUTION_BOT_TOKEN }}
