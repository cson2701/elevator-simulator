name: Build APK on Merge

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        id: decode_keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release-key.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=../release-key.jks" > keystore.properties
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keystore.properties

      - name: Build APKs (Debug & Release)
        run: ./gradlew assembleDebug assembleRelease

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          body: |
            Automated build from merge to main.
            - **Debug APK:** For testing and development.
            - **Release APK:** Signed and ready for distribution.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: elevator-simulator-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk

      - name: Post to Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'C0B9S2W064A'
          slack-message: |
            *New Build Available* ✅
            The PR has been merged and the APKs are ready.
            *Release APK:* ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release.apk
            *Debug APK:* ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-debug.apk
            *Run Summary:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.APK_DISTRIBUTION_BOT_TOKEN }}
