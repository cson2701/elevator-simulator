name: Build APK on Merge

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            Automated build from merge to main.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: elevator-simulator-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Post to Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'C0B9S2W064A'
          slack-message: |
            *New APK Build Available* ✅
            The PR has been merged and the APK is ready.
            *Direct APK Download:* ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-debug.apk
            *Run Summary:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.APK_DISTRIBUTION_BOT_TOKEN }}
